<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { margin: 0; font-family: sans-serif; }
      .shell { width: 100%; }
      .input { width: 100%; padding: 0.6rem 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; box-sizing: border-box; }
      .menu { margin-top: 0.4rem; border: 1px solid #e5e7eb; border-radius: 0.5rem; max-height: 260px; overflow-y: auto; background: white; }
      .option, .load-more { width: 100%; text-align: left; padding: 0.7rem 0.8rem; border: 0; border-bottom: 1px solid #f3f4f6; background: white; cursor: pointer; }
      .option:hover, .load-more:hover { background: #f8fafc; }
      .helper { color: #6b7280; font-size: 0.85rem; margin-top: 0.25rem; }
    </style>
  </head>
  <body>
    <div class="shell">
      <input id="query" class="input" placeholder="Type tata, infos, reliance, hdfc..." />
      <div class="helper">Type a company name or ticker, then choose from the list below.</div>
      <div id="menu" class="menu"></div>
    </div>
    <script>
      let latestArgs = { query: '', results: [], has_more: false };
      const input = document.getElementById('query');
      const menu = document.getElementById('menu');

      function sendValue(value) {
        parent.postMessage({
          isStreamlitMessage: true,
          type: 'streamlit:setComponentValue',
          value: JSON.stringify(value),
        }, '*');
      }

      let queryTimer = null;

      function emitQuery() {
        sendValue({ type: 'query', value: input.value });
      }

      function render() {
        input.value = latestArgs.query || '';
        menu.innerHTML = '';
        (latestArgs.results || []).forEach((item) => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'option';
          button.textContent = item.label;
          button.onclick = () => sendValue({ type: 'select', symbol: item.symbol, company_name: item.company_name, exchange: item.exchange });
          menu.appendChild(button);
        });
        if (latestArgs.has_more) {
          const loadMore = document.createElement('button');
          loadMore.type = 'button';
          loadMore.className = 'load-more';
          loadMore.textContent = 'Load more';
          loadMore.onclick = () => sendValue({ type: 'load_more' });
          menu.appendChild(loadMore);
        }
      }

      input.addEventListener('input', () => {
        if (queryTimer) {
          clearTimeout(queryTimer);
        }
        queryTimer = setTimeout(emitQuery, 180);
      });

      input.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          if (queryTimer) {
            clearTimeout(queryTimer);
          }
          emitQuery();
        }
      });

      window.addEventListener('message', (event) => {
        const data = event.data;
        if (!data || data.type !== 'streamlit:render') return;
        latestArgs = data.args || latestArgs;
        render();
        parent.postMessage({ isStreamlitMessage: true, type: 'streamlit:setFrameHeight', height: document.body.scrollHeight }, '*');
      });

      parent.postMessage({ isStreamlitMessage: true, type: 'streamlit:componentReady', apiVersion: 1 }, '*');
    </script>
  </body>
</html>
